# ============================================================
# Cloud Build — Despliegue de Cuadrilla Maestra en Google Cloud
# Construye y despliega backend y frontend en Cloud Run.
#
# Variables de sustitución (configúralas en el trigger o con --substitutions):
#   _REGION          ej. us-central1
#   _DB_INSTANCE     conexión Cloud SQL, ej. proyecto:region:instancia
#   _API_URL         URL pública del backend, ej. https://api.cuadrillamaestra.com/api
# ============================================================
substitutions:
  _REGION: us-central1
  _DB_INSTANCE: ''
  _API_URL: 'https://api.cuadrillamaestra.com/api'
  _GOOGLE_CLIENT_ID: '120096430295-sembfqkimdvglai65araoolpu3dsvuaq.apps.googleusercontent.com'
  _GS_BUCKET_NAME: 'cuadrilla-media-120096430295'

steps:
  # ---------- Backend ----------
  - name: 'gcr.io/cloud-builders/docker'
    args:
      ['build', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/cuadrilla/backend:$SHORT_SHA',
       './backend']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/cuadrilla/backend:$SHORT_SHA']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - cuadrilla-backend
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/cuadrilla/backend:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --add-cloudsql-instances=${_DB_INSTANCE}
      - --set-env-vars=DEBUG=False,DB_HOST=/cloudsql/${_DB_INSTANCE},EMAIL_HOST=smtp.gmail.com,EMAIL_PORT=587,EMAIL_USE_TLS=True,EMAIL_HOST_USER=cuadrillamaestra@gmail.com,DEFAULT_FROM_EMAIL=cuadrillamaestra@gmail.com,GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID},GS_BUCKET_NAME=${_GS_BUCKET_NAME}
      - --set-secrets=SECRET_KEY=cuadrilla-secret-key:latest,DB_PASSWORD=cuadrilla-db-password:latest,EMAIL_HOST_PASSWORD=cuadrilla-email-password:latest

  # ---------- Frontend ----------
  - name: 'gcr.io/cloud-builders/docker'
    args:
      ['build', '--build-arg', 'REACT_APP_API_URL=${_API_URL}',
       '--build-arg', 'REACT_APP_GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID}',
       '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/cuadrilla/frontend:$SHORT_SHA',
       './frontend']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/cuadrilla/frontend:$SHORT_SHA']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - cuadrilla-frontend
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/cuadrilla/frontend:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/cuadrilla/backend:$SHORT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/cuadrilla/frontend:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
