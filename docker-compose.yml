services:
  # ---------- Base de datos PostgreSQL ----------
  db:
    image: postgres:16
    container_name: cuadrilla-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-cuadrillamaestra}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-cuadrillamaestra}"]
      timeout: 20s
      retries: 10
    networks:
      - cuadrilla_net

  # ---------- Backend Django ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cuadrilla-backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cuadrilla_net

  # ---------- Frontend React ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000/api}
    container_name: cuadrilla-frontend
    ports:
      - "3000:8080"
    depends_on:
      - backend
    networks:
      - cuadrilla_net

volumes:
  postgres_data:

networks:
  cuadrilla_net:
    driver: bridge
